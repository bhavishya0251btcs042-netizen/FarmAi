<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmAI | Disease Detection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdf4',
                            500: '#10b981',
                            600: '#059669',
                        },
                        deep: '#020617'
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .drop-zone {
            border: 2px dashed rgba(16, 185, 129, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drop-zone.active {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
            transform: scale(1.02);
        }

        .scanner-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #10b981, transparent);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 30;
            display: none;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 15px #10b981;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .gradient-text-green {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen font-sans flex flex-col items-center pb-20 bg-slate-900">

    <!-- Header -->
    <header class="w-full h-20 flex items-center justify-between px-8 border-b border-white/5 bg-deep/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-brand-500/10 border border-brand-500/20 flex items-center justify-center p-1.5">
                <img src="logo/logo.png" alt="Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="font-display text-xl font-bold text-white leading-none">Farm<span class="text-brand-500">AI</span></h1>
        </div>
        <div class="flex items-center gap-6">
            <a href="/history-page" class="text-xs font-bold text-slate-400 hover:text-white uppercase tracking-widest transition-colors">History</a>
            <a href="/" class="text-xs font-bold text-slate-400 hover:text-white uppercase tracking-widest transition-colors">Dashboard</a>
        </div>
    </header>

    <main class="max-w-4xl w-full px-6 mt-16 text-center">
        <div class="mb-12">
            <h2 class="font-display text-5xl font-extrabold text-white mb-4">Plant Health <span class="gradient-text-green">Vision</span></h2>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto">Upload a photo to identify diseases with multi-tier AI diagnostics.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 items-start">
            <div class="glass-card rounded-[2.5rem] p-6 flex flex-col h-[500px]">
                <div id="scannerContainer" class="drop-zone flex-grow relative overflow-hidden rounded-3xl">
                    <div id="scannerLine" class="scanner-line"></div>
                    <img id="previewImage" class="hidden absolute inset-0 w-full h-full object-contain z-20">
                    
                    <div id="initialOverlay" class="absolute inset-0 z-40 flex flex-col items-center justify-center bg-deep/50 backdrop-blur-sm">
                        <div class="w-20 h-20 rounded-full bg-brand-500/10 flex items-center justify-center mb-6">
                            <i class="fas fa-upload text-brand-500 text-3xl"></i>
                        </div>
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(this.files[0])">
                        <button onclick="document.getElementById('fileInput').click()" class="bg-brand-500 hover:bg-brand-600 px-10 py-4 rounded-2xl text-white font-black uppercase tracking-widest transition-all">Upload Photo</button>
                    </div>
                </div>

                <div class="mt-4">
                    <select id="cropSelector" class="w-full px-4 py-3 rounded-2xl text-sm font-semibold text-white outline-none border border-slate-700 bg-slate-800/80 focus:border-brand-500 transition-all">
                        <option value="">-- Auto Detect Crop --</option>
                        <option value="maize">Maize/Corn</option>
                        <option value="rice">Rice/Paddy</option>
                        <option value="wheat">Wheat</option>
                        <option value="apple">Apple</option>
                        <option value="banana">Banana</option>
                    </select>
                </div>
            </div>

            <!-- Result Section -->
            <div class="glass-card rounded-[2.5rem] p-8 min-h-[500px] flex flex-col items-center justify-center relative overflow-hidden">
                <div id="emptyResult" class="text-center animate-fadeIn">
                    <div class="w-24 h-24 rounded-full bg-slate-800 flex items-center justify-center mx-auto mb-6">
                        <i class="fas fa-microscope text-slate-600 text-4xl"></i>
                    </div>
                    <p class="text-slate-500 font-medium">Capture or upload an image to start the AI bio-diagnostic scan</p>
                </div>

                <div id="resultContent" class="hidden w-full animate-fadeIn text-left">
                    <div class="flex items-center gap-2 mb-6">
                        <span class="px-3 py-1 rounded-full bg-brand-500/10 border border-brand-500/20 text-brand-500 text-[10px] font-black uppercase tracking-widest">Verified Diagnosis</span>
                    </div>

                    <h3 id="diseaseName" class="text-3xl font-black text-white mb-4 leading-tight">Disease Name</h3>
                    
                    <div class="mb-8">
                        <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">
                            <span>Diagnostic Confidence</span>
                            <span id="confidenceValue">0%</span>
                        </div>
                        <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                            <div id="confidenceBar" class="h-full bg-brand-500 transition-all duration-1000" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="p-6 rounded-3xl bg-white/5 border border-white/5 mb-8">
                        <h4 class="text-xs font-black text-brand-500 uppercase tracking-widest mb-3">Counter-Measure</h4>
                        <p id="treatmentText" class="text-sm text-slate-300 leading-relaxed italic">Treatment instructions...</p>
                    </div>

                    <div class="flex gap-3">
                        <button class="flex-1 py-3 rounded-2xl bg-white/5 border border-white/10 text-xs font-bold hover:bg-brand-500 transition-all" onclick="location.reload()">New Scan</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const previewImage = document.getElementById('previewImage');
        const initialOverlay = document.getElementById('initialOverlay');
        const scannerLine = document.getElementById('scannerLine');
        const emptyResult = document.getElementById('emptyResult');
        const resultContent = document.getElementById('resultContent');

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                previewImage.classList.remove('hidden');
                initialOverlay.classList.add('hidden');
                analyzeImage(file);
            };
            reader.readAsDataURL(file);
        }

        async function analyzeImage(file) {
            const token = localStorage.getItem('token');
            scannerLine.style.display = 'block';
            emptyResult.classList.add('hidden');
            resultContent.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', file);
            const crop = document.getElementById('cropSelector').value;
            if (crop) formData.append('crop', crop);

            try {
                const res = await fetch('/predict-disease', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData,
                    cache: 'no-store'
                });
                
                const data = await res.json();
                
                setTimeout(() => {
                    scannerLine.style.display = 'none';
                    displayResult(data);
                }, 1500);
            } catch (err) {
                alert("Scan failed. Engine unreachable.");
                scannerLine.style.display = 'none';
                emptyResult.classList.remove('hidden');
            }
        }

        function displayResult(data) {
            if (data.error) { alert(data.error); return; }
            resultContent.classList.remove('hidden');
            document.getElementById('diseaseName').textContent = data.disease;
            document.getElementById('treatmentText').textContent = data.treatment;
            const conf = (data.confidence * 100);
            document.getElementById('confidenceValue').textContent = conf.toFixed(1) + '%';
            document.getElementById('confidenceBar').style.width = conf + '%';
        }
    </script>
</body>
</html>
