<!-- FarmAI Chatbot Widget v2 — with image/document upload -->
<style>
  #farmbot-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9999;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #10b981, #059669);
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(16, 185, 129, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  #farmbot-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 40px rgba(16, 185, 129, 0.5);
  }

  #farmbot-btn .bot-notif {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 18px;
    height: 18px;
    background: #ef4444;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 800;
    color: white;
    display: f background: linear-gradient(135deg, #10b981, #059669);
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 32px rgba(16, 185, 129, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  #farmbot-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 40px rgba(16, 185, 129, 0.5);
  }

  #farmbot-btn .notif {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 18px;
    height: 18px;
    background: #ef4444;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 800;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #020617;
  }

  #farmbot-window {
    position: fixed;
    bottom: 100px;
    right: 28px;
    z-index: 9998;
    width: 370px;
    max-height: 560px;
    background: #0f172a;
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: scale(0.8) translateY(20px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  #farmbot-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  @media (max-width: 480px) {
    #farmbot-window {
      width: calc(100vw - 32px);
      right: 16px;
      bottom: 90px;
    }
  }

  .bot-header {
    background: linear-gradient(135deg, #10b981, #059669);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bot-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .bot-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 380px;
    scroll-behavior: smooth;
  }

  .bot-messages::-webkit-scrollbar {
    width: 4px;
  }

  .bot-messages::-webkit-scrollbar-track {
    background: transparent;
  }

  .bot-messages::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 2px;
  }

  .msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg.bot {
    background: #1e293b;
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
  }

  .msg.user {
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }

  .msg.typing {
    background: #1e293b;
    color: #64748b;
    align-self: flex-start;
    font-style: italic;
  }

  .bot-input-row {
    padding: 12px 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .bot-input {
    flex: 1;
    background: #1e293b;
    border: 1px solid rgba(148, 163, 184, 0.1);
    border-radius: 12px;
    padding: 10px 14px;
    color: white;
    font-size: 13px;
    outline: none;
    font-family: inherit;
    resize: none;
    max-height: 80px;
    transition: border-color 0.2s;
  }

  .bot-input:focus {
    border-color: #10b981;
  }

  .bot-send {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .bot-send:hover {
    transform: scale(1.05);
  }

  .bot-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .quick-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 12px;
  }

  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.2);
    color: #10b981;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover {
    background: rgba(16, 185, 129, 0.2);
  }
</style>

<!-- Floating Button -->
<button id="farmbot-btn" onclick="toggleBot()" title="FarmAI Assistant">
  <span id="bot-icon" style="font-size:24px;">🌾</span>
  <span class="notif" id="bot-notif">1</span>
</button>

<!-- Chat Window -->
<div id="farmbot-window">
  <!-- Header -->
  <div class="bot-header">
    <div class="bot-avatar">🌾</div>
    <div>
      <p style="margin:0;font-weight:800;color:white;font-size:14px;">FarmAI Assistant</p>
      <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.75);">Agriculture Expert • Online</p>
    </div>
    <button onclick="toggleBot()"
      style="margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:18px;padding:4px;">✕</button>
  </div>

  <!-- Messages -->
  <div class="bot-messages" id="bot-messages">
    <div class="msg bot">
      👋 Hi! I'm your <strong>FarmAI Assistant</strong>.<br><br>
      Ask me anything about crops, diseases, fertilizers, irrigation, or farming tips. I'm here to help! 🌱
    </div>
  </div>

  <!-- Quick chips -->
  <div class="quick-chips" id="quick-chips">
    <span class="chip" onclick="sendChip('Best crops for clay soil?')">🌱 Clay soil crops</span>
    <span class="chip" onclick="sendChip('How to treat rice blast disease?')">🍚 Rice blast</span>
    <span class="chip" onclick="sendChip('Best fertilizer for wheat?')">🌾 Wheat fertilizer</span>
    <span class="chip" onclick="sendChip('How to increase crop yield?')">📈 Boost yield</span>
    <span class="chip" onclick="sendChip('Signs of nitrogen deficiency in plants?')">⚠️ N deficiency</span>
  </div>

  <!-- Input -->
  <div class="bot-input-row" style="position:relative; flex-wrap:wrap;">
    <label for="bot-file"
      style="cursor:pointer; color:#94a3b8; font-size:16px; padding:8px 8px 8px 4px; transition:color 0.2s;"
      title="Upload Image or Document" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='#94a3b8'">
      <i class="fas fa-paperclip"></i>
    </label>
    <input type="file" id="bot-file" accept="image/*,.pdf,.txt,.csv" style="display:none;"
      onchange="handleFileSelect(event)">
    <textarea id="bot-input" class="bot-input" rows="1" placeholder="Ask about crops, diseases... or attach file"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="bot-send" id="bot-send-btn" onclick="sendMessage()">
      <i class="fas fa-paper-plane" style="font-size:14px;"></i>
    </button>
    <div id="file-preview"
      style="display:none; width:100%; font-size:10px; color:#10b981; margin-top:6px; font-weight:bold;"><i
        class="fas fa-file-alt"></i> <span id="file-name" style="margin-left:4px;"></span><button onclick="clearFile()"
        style="margin-left:8px; background:none; border:none; color:#ef4444; cursor:pointer;"
        title="Remove attachment"><i class="fas fa-times"></i></button></div>
  </div>
</div>

<script>
  const BASE_URL = "https://farmai-production-49b4.up.railway.app";
  let botOpen = false;
  let chatHistory = [];
  let isTyping = false;
  let selectedFile = null;

  function handleFileSelect(e) {
    if (e.target.files.length > 0) {
      selectedFile = e.target.files[0];
      document.getElementById('file-name').innerText = selectedFile.name;
      document.getElementById('file-preview').style.display = 'block';
      document.getElementById('bot-input').placeholder = "Ask a question about this file...";
    }
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('bot-file').value = '';
    document.getElementById('file-preview').style.display = 'none';
    document.getElementById('bot-input').placeholder = "Ask about crops, diseases... or attach file";
  }

  function toggleBot() {
    botOpen = !botOpen;
    const win = document.getElementById('farmbot-window');
    win.classList.toggle('open', botOpen);
    document.getElementById('bot-notif').style.display = botOpen ? 'none' : 'flex';
    if (botOpen) document.getElementById('bot-input').focus();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 80) + 'px';
  }

  function sendChip(text) {
    document.getElementById('bot-input').value = text;
    document.getElementById('quick-chips').style.display = 'none';
    sendMessage();
  }

  function appendMsg(text, role) {
    const msgs = document.getElementById('bot-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('bot-input');
    const text = input.value.trim() || (selectedFile ? 'Analyze this file' : '');
    if (!text && !selectedFile) return;

    input.value = '';
    input.style.height = 'auto';
    isTyping = true;
    document.getElementById('bot-send-btn').disabled = true;
    document.getElementById('quick-chips').style.display = 'none';

    let msgContent = text;
    if (selectedFile) msgContent += ` <br><span class="chip" style="font-size:9px; padding:2px 6px;">📄 ${selectedFile.name}</span>`;
    appendMsg(msgContent, 'user');

    // Typing indicator
    const typingDiv = appendMsg('Analyzing...', 'typing');

    try {
      let res;
      if (selectedFile) {
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('message', text);

        chatHistory.push({ role: 'user', content: `[User attached file: ${selectedFile.name}] ${text}` });

        const BASE_URL = "https://farmai-production-49b4.up.railway.app";
        res = await fetch(`${BASE_URL}/chat-file`, {
          method: 'POST',
          body: formData
        });
      } else {
        chatHistory.push({ role: 'user', content: text });
        res = await fetch(`${BASE_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: chatHistory.slice(-6) })
        });
      }

      const data = await res.json();
      typingDiv.remove();
      const reply = data.reply || 'Sorry, I could not get a response.';
      appendMsg(reply, 'bot');
      chatHistory.push({ role: 'assistant', content: reply });
    } catch (err) {
      typingDiv.remove();
      appendMsg('Connection error. Please check if the server is running.', 'bot');
    }

    clearFile();
    isTyping = false;
    document.getElementById('bot-send-btn').disabled = false;
    input.focus();
  }

  // Show notification dot after 3 seconds if not opened
  setTimeout(() => {
    if (!botOpen) {
      document.getElementById('bot-notif').style.display = 'flex';
    }
  }, 3000);
</script>
